# Default atom: rubidium-87, D2 line (5S1/2 F=2 -> 5P3/2 F'=3)
# NOTE: scientific notation must be written like 6.0666e+6 (with decimal point
# and a signed exponent), otherwise PyYAML parses it as a string, not a float.
atom:
  mass: 87            # mass in amu
  gamma: 6.0666e+6    # natural linewidth divided by 2pi, in Hz
  wavelength: 780.241 # wavelength of transition in nm
  gF: 0.5             # g-factor of the F=2 ground state
  Isat: 1.67          # saturation intensity in mW/cm^2 (D2 cycling transition)

